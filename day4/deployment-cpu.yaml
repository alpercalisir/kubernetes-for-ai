# deployment-cpu.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-inference-cpu
spec:
  replicas: 10
  template:
    spec:
      containers:
      - name: inference
        image: ml-inference:cpu    # 308MB
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"